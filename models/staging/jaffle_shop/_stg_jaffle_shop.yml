version: 2

models:
  - name: stg_jaffle_shop__customers
    description: One unique customer per row, staged from raw jaffle shop customers data.
    columns:
      - name: customer_id
        description: Primary key. Unique identifier for each customer.
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: One unique order per row, staged from raw jaffle shop orders data.
    columns:
      - name: order_id
        description: Primary key. Unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers.
        data_tests:
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id
