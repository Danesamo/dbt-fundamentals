version: 2

models:
  - name: stg_stripe__payments
    description: One unique payment per row, staged from raw Stripe payments data.
    columns:
      - name: payment_id
        description: Primary key. Unique identifier for each payment.
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_jaffle_shop__orders.
      - name: payment_method
        description: The payment method used (credit_card, coupon, bank_transfer, gift_card).
      - name: status
        description: Payment status. Only successful payments contribute to order amounts.
        data_tests:
          - accepted_values:
              values: ['success', 'fail']
      - name: amount
        description: Payment amount in dollars. Stored in cents in the source and converted to dollars.
      - name: created_at
        description: Timestamp when the payment was created.
