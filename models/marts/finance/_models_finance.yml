version: 2

models:
  - name: fct_orders
    description: One record per order with associated payment amount. Fact table for orders.
    columns:
      - name: order_id
        description: Primary key. Unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to dim_customers.
      - name: order_date
        description: Date the order was placed.
      - name: amount
        description: Total amount paid for the order in dollars (successful payments only). 0 if no successful payment.
